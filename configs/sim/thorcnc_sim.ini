# ThorCNC Simulation Config – 3-Achsen Fräse, metrisch (mm)

[EMC]
MACHINE = ThorCNC-Sim
VERSION = 1.1
DEBUG   = 0

[DISPLAY]
DISPLAY          = thorcnc
CYCLE_TIME       = 0.100
POSITION_OFFSET  = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE    = 2.0
MAX_SPINDLE_OVERRIDE = 2.0
PROGRAM_PREFIX   = ../../nc_files
INCREMENTS       = 10mm 1mm 0.1mm 0.01mm
PREFS_FILE = config.prefs

[FILTER]
PROGRAM_EXTENSION = .ngc,.nc,.gcode G-Code
PROGRAM_EXTENSION = .py Python-Skript
py = python3

[TASK]
TASK       = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = thorcnc_sim.var
SUBROUTINE_PATH = ../../nc_files/subroutines:subroutines:subroutines/motion:subroutines/tools:subroutines/probing
FEATURES = 30
#REMAP=M6 modalgroup=6 ngc=messe

[EMCMOT]
EMCMOT       = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD  = 0
SERVO_PERIOD = 1000000

[EMCIO]
EMCIO      = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[HAL]
HALFILE = core_sim.hal
HALFILE = sim_spindle_encoder.hal
HALFILE = axis_manualtoolchange.hal
HALFILE = simulated_home.hal
POSTGUI_HALFILE = probe_sim.hal
POSTGUI_HALFILE = thorcnc_postgui.hal
HALUI   = halui

[TRAJ]
COORDINATES             = X Y Z
LINEAR_UNITS            = mm
ANGULAR_UNITS           = degree
DEFAULT_LINEAR_VELOCITY     = 50
MAX_LINEAR_VELOCITY         = 200
DEFAULT_LINEAR_ACCELERATION = 500
MAX_LINEAR_ACCELERATION     = 1000
POSITION_FILE           = thorcnc_sim_pos.txt

[KINS]
KINEMATICS = trivkins
JOINTS     = 3

# ── Achsen ────────────────���───────────────────────────��────────────────────

# Arbeitsbereich: X 0..600, Y 0..500, Z -200..0
# Home-Ecke: X=0 (links), Y=0 (vorne), Z=0 (oben)
# Limits 2mm über die Home-Position hinaus → kein Limit-Konflikt beim Homing

[AXIS_X]
MAX_VELOCITY     = 200
MAX_ACCELERATION = 1000
MIN_LIMIT        =  -2
MAX_LIMIT        = 600

[AXIS_Y]
MAX_VELOCITY     = 200
MAX_ACCELERATION = 1000
MIN_LIMIT        =  -2
MAX_LIMIT        = 500

[AXIS_Z]
MAX_VELOCITY     = 100
MAX_ACCELERATION = 500
MIN_LIMIT        = -200
MAX_LIMIT        =    2

# ── Gelenke ──────────────────────────────────────────────────────────────

# Z zuerst homen (SEQUENCE 0), dann X und Y gleichzeitig (SEQUENCE 1)

[JOINT_0]
TYPE              = LINEAR
HOME              = 0.0
MAX_VELOCITY      = 200
MAX_ACCELERATION  = 1000
MIN_LIMIT         =  -2
MAX_LIMIT         = 600
INPUT_SCALE       = 1000
OUTPUT_SCALE      = 1.0
FERROR            = 1.0
MIN_FERROR        = 0.1
HOME_OFFSET       = 0.0
HOME_SEARCH_VEL   = -20
HOME_LATCH_VEL    = 5
HOME_USE_INDEX    = NO
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE     = 1

[JOINT_1]
TYPE              = LINEAR
HOME              = 0.0
MAX_VELOCITY      = 200
MAX_ACCELERATION  = 1000
MIN_LIMIT         =  -2
MAX_LIMIT         = 500
INPUT_SCALE       = 1000
OUTPUT_SCALE      = 1.0
FERROR            = 1.0
MIN_FERROR        = 0.1
HOME_OFFSET       = 0.0
HOME_SEARCH_VEL   = -20
HOME_LATCH_VEL    = 5
HOME_USE_INDEX    = NO
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE     = 1

[JOINT_2]
TYPE              = LINEAR
HOME              = 0.0
MAX_VELOCITY      = 100
MAX_ACCELERATION  = 500
MIN_LIMIT         = -200
MAX_LIMIT         =    2
INPUT_SCALE       = 1000
OUTPUT_SCALE      = 1.0
FERROR            = 1.0
MIN_FERROR        = 0.1
HOME_OFFSET       = 0.0
HOME_SEARCH_VEL   = 20
HOME_LATCH_VEL    = -5
HOME_USE_INDEX    = NO
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE     = 0

[HALUI]
MDI_COMMAND = G10 L20 P1 X0
MDI_COMMAND = G10 L20 P1 Y0
MDI_COMMAND = G10 L20 P1 Z0
