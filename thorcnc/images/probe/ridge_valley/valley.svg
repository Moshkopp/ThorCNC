<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece with valley (groove) -->
  <rect x="5" y="18" width="70" height="44" fill="#5a5a5a" rx="2"/>
  <!-- Top surface highlight -->
  <line x1="5" y1="18" x2="75" y2="18" stroke="#00cc44" stroke-width="2"/>
  <!-- Valley cutout -->
  <rect x="28" y="18" width="24" height="28" fill="#1a1a1a"/>
  <!-- Probe ball inside valley -->
  <circle cx="40" cy="36" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow down (measuring depth) -->
  <line x1="40" y1="44" x2="40" y2="50" stroke="white" stroke-width="2"/>
  <polygon points="37,50 40,56 43,50" fill="white"/>
  <!-- Width arrows at top -->
  <line x1="28" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5"/>
  <polygon points="18,7 12,10 18,13" fill="white"/>
  <line x1="52" y1="10" x2="62" y2="10" stroke="white" stroke-width="1.5"/>
  <polygon points="62,7 68,10 62,13" fill="white"/>
  <line x1="28" y1="10" x2="52" y2="10" stroke="white" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
