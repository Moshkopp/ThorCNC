<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece base -->
  <rect x="5" y="52" width="70" height="18" fill="#5a5a5a" rx="2"/>
  <!-- Ridge (raised feature) -->
  <rect x="28" y="32" width="24" height="20" fill="#5a5a5a"/>
  <!-- Ridge top surface -->
  <line x1="28" y1="32" x2="52" y2="32" stroke="#00cc44" stroke-width="2"/>
  <!-- Probe ball on left side of ridge -->
  <circle cx="20" cy="42" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow right -->
  <line x1="28" y1="42" x2="34" y2="42" stroke="white" stroke-width="2"/>
  <polygon points="34,39 40,42 34,45" fill="white"/>
  <!-- Width arrows below ridge -->
  <line x1="28" y1="62" x2="18" y2="62" stroke="white" stroke-width="1.5"/>
  <polygon points="18,59 12,62 18,65" fill="white"/>
  <line x1="52" y1="62" x2="62" y2="62" stroke="white" stroke-width="1.5"/>
  <polygon points="62,59 68,62 62,65" fill="white"/>
  <line x1="28" y1="62" x2="52" y2="62" stroke="white" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
