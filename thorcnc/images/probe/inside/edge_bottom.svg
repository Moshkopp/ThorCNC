<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Inside Bottom Edge (Pocket floor is 45x45 grey) -->
  <rect x="0" y="0" width="80" height="80" fill="#2a2a2a"/>
  <!-- Bottom Wall (Grey #5a5a5a) -->
  <rect x="0" y="45" width="80" height="35" fill="#5a5a5a"/>
  <!-- Probe Ball on Floor -->
  <circle cx="40" cy="25" r="6" fill="#cc22cc" stroke="#ff66ff" stroke-width="1"/>
  <line x1="40" y1="25" x2="40" y2="50" stroke="white" stroke-width="2"/>
  <polygon points="36,50 40,55 44,50" fill="white"/>
</svg>
