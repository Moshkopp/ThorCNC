<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece -->
  <rect x="5" y="5" width="70" height="70" fill="#5a5a5a" rx="2"/>
  <!-- Pocket -->
  <rect x="18" y="18" width="44" height="44" fill="#1a1a1a" rx="1"/>
  <!-- Probe ball touching bottom wall -->
  <circle cx="40" cy="55" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow left -->
  <line x1="33" y1="55" x2="24" y2="55" stroke="white" stroke-width="2"/>
  <polygon points="24,52 18,55 24,58" fill="white"/>
  <!-- Arrow right -->
  <line x1="47" y1="55" x2="56" y2="55" stroke="white" stroke-width="2"/>
  <polygon points="56,52 62,55 56,58" fill="white"/>
</svg>
