<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece -->
  <rect x="5" y="5" width="70" height="70" fill="#5a5a5a" rx="2"/>
  <!-- Pocket -->
  <rect x="18" y="18" width="44" height="44" fill="#1a1a1a" rx="1"/>
  <!-- Probe ball touching right wall -->
  <circle cx="55" cy="40" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow up -->
  <line x1="55" y1="33" x2="55" y2="24" stroke="white" stroke-width="2"/>
  <polygon points="52,24 55,18 58,24" fill="white"/>
  <!-- Arrow down -->
  <line x1="55" y1="47" x2="55" y2="56" stroke="white" stroke-width="2"/>
  <polygon points="52,56 55,62 58,56" fill="white"/>
</svg>
