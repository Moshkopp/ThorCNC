<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Inside Right Edge (Pocket floor is 45x45 grey) -->
  <rect x="0" y="0" width="80" height="80" fill="#2a2a2a"/>
  <!-- Right Wall (Grey #5a5a5a) -->
  <rect x="45" y="0" width="35" height="80" fill="#5a5a5a"/>
  <!-- Probe Ball on Floor -->
  <circle cx="25" cy="40" r="6" fill="#cc22cc" stroke="#ff66ff" stroke-width="1"/>
  <line x1="25" y1="40" x2="50" y2="40" stroke="white" stroke-width="2"/>
  <polygon points="50,36 55,40 50,44" fill="white"/>
</svg>
