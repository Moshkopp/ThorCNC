<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece -->
  <rect x="5" y="5" width="70" height="70" fill="#5a5a5a" rx="2"/>
  <!-- Pocket -->
  <rect x="18" y="18" width="44" height="44" fill="#1a1a1a" rx="1"/>
  <!-- Probe ball touching top wall (y=18) and left wall (x=18): center = 18+7=25 -->
  <circle cx="25" cy="25" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow right (into pocket) -->
  <line x1="33" y1="25" x2="48" y2="25" stroke="white" stroke-width="2"/>
  <polygon points="48,22 54,25 48,28" fill="white"/>
  <!-- Arrow down (into pocket) -->
  <line x1="25" y1="33" x2="25" y2="48" stroke="white" stroke-width="2"/>
  <polygon points="22,48 25,54 28,48" fill="white"/>
</svg>
