<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece -->
  <rect x="5" y="5" width="70" height="70" fill="#5a5a5a" rx="2"/>
  <!-- Pocket -->
  <rect x="18" y="18" width="44" height="44" fill="#1a1a1a" rx="1"/>
  <!-- Probe ball touching bottom wall (y=62) and right wall (x=62): center = 62-7=55 -->
  <circle cx="55" cy="55" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow left (into pocket) -->
  <line x1="47" y1="55" x2="32" y2="55" stroke="white" stroke-width="2"/>
  <polygon points="32,52 26,55 32,58" fill="white"/>
  <!-- Arrow up (into pocket) -->
  <line x1="55" y1="47" x2="55" y2="32" stroke="white" stroke-width="2"/>
  <polygon points="52,32 55,26 58,32" fill="white"/>
</svg>
