<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece -->
  <rect x="5" y="5" width="70" height="70" fill="#5a5a5a" rx="2"/>
  <!-- Pocket -->
  <rect x="18" y="18" width="44" height="44" fill="#1a1a1a" rx="1"/>
  <!-- Probe ball in center -->
  <circle cx="40" cy="40" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow left -->
  <line x1="32" y1="40" x2="24" y2="40" stroke="white" stroke-width="2"/>
  <polygon points="24,37 18,40 24,43" fill="white"/>
  <!-- Arrow right -->
  <line x1="48" y1="40" x2="56" y2="40" stroke="white" stroke-width="2"/>
  <polygon points="56,37 62,40 56,43" fill="white"/>
  <!-- Arrow up -->
  <line x1="40" y1="32" x2="40" y2="24" stroke="white" stroke-width="2"/>
  <polygon points="37,24 40,18 43,24" fill="white"/>
  <!-- Arrow down -->
  <line x1="40" y1="48" x2="40" y2="56" stroke="white" stroke-width="2"/>
  <polygon points="37,56 40,62 43,56" fill="white"/>
</svg>
