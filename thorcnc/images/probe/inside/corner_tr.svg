<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece -->
  <rect x="5" y="5" width="70" height="70" fill="#5a5a5a" rx="2"/>
  <!-- Pocket -->
  <rect x="18" y="18" width="44" height="44" fill="#1a1a1a" rx="1"/>
  <!-- Probe ball touching top wall (y=18) and right wall (x=62): center = 62-7=55 -->
  <circle cx="55" cy="25" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow left (into pocket) -->
  <line x1="47" y1="25" x2="32" y2="25" stroke="white" stroke-width="2"/>
  <polygon points="32,22 26,25 32,28" fill="white"/>
  <!-- Arrow down (into pocket) -->
  <line x1="55" y1="33" x2="55" y2="48" stroke="white" stroke-width="2"/>
  <polygon points="52,48 55,54 58,48" fill="white"/>
</svg>
