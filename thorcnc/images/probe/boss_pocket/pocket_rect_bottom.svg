<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Workpiece side view -->
  <rect x="5" y="10" width="70" height="42" fill="#5a5a5a" rx="2"/>
  <!-- Rectangular hole from top (sharp corners) -->
  <rect x="28" y="10" width="24" height="30" fill="#1a1a1a"/>
  <!-- Bottom surface highlight (Z reference) -->
  <line x1="5" y1="52" x2="75" y2="52" stroke="#00cc44" stroke-width="2"/>
  <!-- Probe ball at bottom of hole -->
  <circle cx="40" cy="44" r="7" fill="#cc22cc" stroke="#ff66ff" stroke-width="1.5"/>
  <!-- Arrow up (measuring from bottom) -->
  <line x1="40" y1="36" x2="40" y2="28" stroke="white" stroke-width="2"/>
  <polygon points="37,28 40,22 43,28" fill="white"/>
  <!-- Corner markers to indicate rectangular -->
  <rect x="27" y="9" width="4" height="4" fill="none" stroke="white" stroke-width="1"/>
  <rect x="49" y="9" width="4" height="4" fill="none" stroke="white" stroke-width="1"/>
  <!-- Z label -->
  <text x="6" y="60" font-size="8" fill="#00cc44" font-family="sans-serif">Z</text>
</svg>
